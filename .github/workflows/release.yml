name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Create plugin zip
        run: |
          mkdir -p LumaDeck
          cp plugin.json LumaDeck/
          cp main.py LumaDeck/
          cp package.json LumaDeck/
          cp -r dist LumaDeck/
          cp -r backend LumaDeck/
          # Remove __pycache__ and .pyc files
          find LumaDeck -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true
          find LumaDeck -name '*.pyc' -delete 2>/dev/null || true
          # backend/data/ has to be writable by the plugin runtime (the _root
          # flag doesn't elevate the actual python process — Decky still
          # spawns it as `deck`). 777 lets the plugin create api.json on
          # first init even though Decky deploys plugins as root:root 755.
          chmod 777 LumaDeck/backend/data
          zip -r LumaDeck.zip LumaDeck/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: LumaDeck.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
