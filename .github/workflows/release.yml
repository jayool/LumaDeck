name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # Fetch the Goldberg (gbe_fork) emulator into backend/deps/Goldberg and
      # reshape it to the flat layout goldberg.py expects. These binaries are
      # ~40 MB, gitignored, and only pulled in here for the release zip — the
      # same model as dist/. Steamless.CLI is committed (small) so it needs no
      # fetch step. Pinned to a known release for reproducible builds.
      - name: Fetch Goldberg (gbe_fork)
        env:
          GBE_TAG: release-2026_05_30
        run: |
          set -euo pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full
          base="https://github.com/Detanup01/gbe_fork/releases/download/${GBE_TAG}"
          work="$(mktemp -d)"
          dest="backend/deps/Goldberg"
          mkdir -p "$dest/steam_settings"

          curl -fsSL -o "$work/lin.tar.bz2" "$base/emu-linux-release.tar.bz2"
          curl -fsSL -o "$work/win.7z"      "$base/emu-win-release.7z"
          mkdir -p "$work/lin" "$work/win"
          tar -xjf "$work/lin.tar.bz2" -C "$work/lin"
          7z x -y -o"$work/win" "$work/win.7z" >/dev/null

          # Locate the arch-specific libraries robustly (regular, not experimental).
          lin_x86="$(find "$work/lin" -path '*regular/x86/libsteam_api.so' | head -1)"
          lin_x64="$(find "$work/lin" -path '*regular/x64/libsteam_api.so' | head -1)"
          win_x86="$(find "$work/win" -path '*regular/x86/steam_api.dll'   | head -1)"
          win_x64="$(find "$work/win" -path '*regular/x64/steam_api64.dll' | head -1)"
          for v in "$lin_x86" "$lin_x64" "$win_x86" "$win_x64"; do
            [ -n "$v" ] || { echo "::error::gbe_fork layout changed — missing a steam_api binary"; exit 1; }
          done
          cp "$lin_x86" "$dest/libsteam_api.so"
          cp "$lin_x64" "$dest/libsteam_api64.so"
          cp "$win_x86" "$dest/steam_api.dll"
          cp "$win_x64" "$dest/steam_api64.dll"

          # Example steam_settings (overlay/user configs) — best-effort.
          ex="$(find "$work/lin" -type d -iname 'steam_settings*' | head -1)"
          if [ -n "$ex" ]; then
            find "$ex" -maxdepth 1 -type f -name 'configs.*.ini' -exec cp {} "$dest/steam_settings/" \; || true
          fi
          echo "Goldberg bundled:"; ls -la "$dest"

      - name: Create plugin zip
        run: |
          mkdir -p LumaDeck
          cp plugin.json LumaDeck/
          cp main.py LumaDeck/
          cp package.json LumaDeck/
          cp -r dist LumaDeck/
          cp -r backend LumaDeck/
          # Remove __pycache__ and .pyc files
          find LumaDeck -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true
          find LumaDeck -name '*.pyc' -delete 2>/dev/null || true
          # backend/data/ has to be writable by the plugin runtime (the _root
          # flag doesn't elevate the actual python process — Decky still
          # spawns it as `deck`). 777 lets the plugin create api.json on
          # first init even though Decky deploys plugins as root:root 755.
          chmod 777 LumaDeck/backend/data
          zip -r LumaDeck.zip LumaDeck/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: LumaDeck.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
